<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube SEO Master Tools</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header>
            <h1>🚀 YouTube SEO Master</h1>
            <p>Free Tools for Creators</p>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" onclick="openTab('keywords')">Keyword Research</button>
            <button class="tab-btn" onclick="openTab('titles')">Title Generator</button>
            <button class="tab-btn" onclick="openTab('tags')">Tag Generator</button>
        </nav>

        <div class="content-box">
            <div id="keywords" class="tab-content active">
                <h2>YouTube Keyword Research</h2>
                <input type="text" id="keywordInput" placeholder="Enter a seed keyword (e.g., Cooking)">
                <button onclick="generateKeywords()">Search Keywords</button>
                <div id="keywordResult" class="result-box"></div>
            </div>

            <div id="titles" class="tab-content">
                <h2>YouTube Title Generator</h2>
                <input type="text" id="titleInput" placeholder="Enter your topic (e.g., iPhone 15 Review)">
                <button onclick="generateTitles()">Generate Titles</button>
                <div id="titleResult" class="result-box"></div>
            </div>

            <div id="tags" class="tab-content">
                <h2>YouTube Tag Generator</h2>
                <input type="text" id="tagInput" placeholder="Enter main keyword (e.g., Gaming)">
                <button onclick="generateTags()">Generate Tags</button>
                <div id="tagResult" class="result-box"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
